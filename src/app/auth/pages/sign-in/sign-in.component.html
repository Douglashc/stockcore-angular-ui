<div class="mb-10 text-left">
  <div class="flex items-center gap-2.5 mb-3 text-app-text-main-light dark:text-app-text-main-dark">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600 dark:text-indigo-400" viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="3" width="7" height="7" rx="1" />
      <rect x="14" y="3" width="7" height="7" rx="1" />
      <rect x="3" y="14" width="7" height="7" rx="1" />
      <rect x="14" y="14" width="7" height="7" rx="1" />
    </svg>
    <span class="text-lg font-semibold tracking-tight">StockCore</span>
  </div>
  <h2 class="text-2xl font-bold tracking-tight text-app-text-main-light dark:text-app-text-main-dark">Identifícate</h2>
  <p class="text-xs mt-1 text-app-text-muted-light dark:text-app-text-muted-dark">Introduce tus credenciales para acceder al sistema.</p>
</div>

<form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-5" autocomplete="off">
  
  <div>
    <label for="username" class="block text-xs font-medium mb-1.5 text-app-text-muted-light dark:text-app-text-muted-dark">
      Usuario o Correo electrónico
    </label>
    <input 
      id="username"
      type="text" 
      formControlName="username"
      placeholder="nombre@empresa.com"
      class="w-full text-sm rounded-lg px-3.5 py-2.5 outline-none transition-all border
             bg-app-input-light dark:bg-app-input-dark 
             text-app-text-main-light dark:text-app-text-main-dark 
             placeholder-slate-400 dark:placeholder-slate-600"
      [ngClass]="usernameInvalid 
        ? 'border-red-500/80 focus:border-red-500' 
        : 'border-app-border-light dark:border-app-border-dark focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500'"
    />
    <p *ngIf="usernameInvalid" class="text-[11px] text-red-600 dark:text-red-400 mt-1 flex items-center gap-1">
      El usuario es obligatorio (mínimo 4 caracteres).
    </p>
  </div>

  <div>
    <div class="flex justify-between items-center mb-1.5">
      <label for="password" class="block text-xs font-medium text-app-text-muted-light dark:text-app-text-muted-dark">
        Contraseña
      </label>
      <a href="#" class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline transition-all">
        ¿Olvidaste tu contraseña?
      </a>
    </div>
    
    <div class="relative">
      <input 
        id="password"
        [type]="showPassword ? 'text' : 'password'" 
        formControlName="password"
        placeholder="••••••••"
        class="w-full text-sm rounded-lg pl-3.5 pr-10 py-2.5 outline-none transition-all border
               bg-app-input-light dark:bg-app-input-dark 
               text-app-text-main-light dark:text-app-text-main-dark 
               placeholder-slate-400 dark:placeholder-slate-600"
        [ngClass]="passwordInvalid 
          ? 'border-red-500/80 focus:border-red-500' 
          : 'border-app-border-light dark:border-app-border-dark focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500'"
      />
      
      <button 
        type="button"
        (click)="showPassword = !showPassword"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
        <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-currentColor="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke-currentColor="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M21.001 21.001L3 3m17.001 18L21 21M3 3l1.964 1.964m1.402 1.402L12 12m0 0l4.636 4.636M12 12L7.364 7.364M12 12v.008h-.008V12z" />
        </svg>
      </button>
    </div>
    <p *ngIf="passwordInvalid" class="text-[11px] text-red-600 dark:text-red-400 mt-1 flex items-center gap-1">
      La contraseña es obligatoria (mínimo 6 caracteres).
    </p>
  </div>

  <button 
    type="submit"
    [disabled]="loading"
    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg transition-all duration-150 flex items-center justify-center gap-2 text-sm disabled:opacity-50 disabled:cursor-not-allowed mt-2 shadow-sm">
    
    <span *ngIf="loading" class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>
    <span>{{ loading ? 'Verificando...' : 'Entrar al sistema' }}</span>
  </button>

</form>
