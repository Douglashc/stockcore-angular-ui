<div
    class="px-5 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/20 flex items-center justify-between select-none text-xs">

    <p class="font-medium text-slate-500 dark:text-slate-400">
        Página <span class="text-slate-800 dark:text-white font-semibold">{{ currentPage }}</span> de <span
            class="text-slate-800 dark:text-white font-semibold">{{ totalPages }}</span>
    </p>

    <div class="flex items-center gap-2">

        <button type="button" (click)="prevPage()" [disabled]="currentPage === 1"
            class="flex items-center justify-center w-8 h-8 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900 transition-all
             disabled:opacity-40 disabled:cursor-not-allowed hover:not-disabled:bg-slate-100 hover:not-disabled:dark:bg-slate-800 hover:not-disabled:text-slate-900 hover:not-disabled:dark:text-white">
            <span class="material-icons text-base">chevron_left</span>
        </button>

        <button type="button" (click)="nextPage()" [disabled]="currentPage === totalPages"
            class="flex items-center justify-center w-8 h-8 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900 transition-all
             disabled:opacity-40 disabled:cursor-not-allowed hover:not-disabled:bg-slate-100 hover:not-disabled:dark:bg-slate-800 hover:not-disabled:text-slate-900 hover:not-disabled:dark:text-white">
            <span class="material-icons text-base">chevron_right</span>
        </button>

    </div>

</div>
