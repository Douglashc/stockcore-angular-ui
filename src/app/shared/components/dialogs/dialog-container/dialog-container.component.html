<div *ngIf="dialogService.isOpen()"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-hidden animate-fade-in">

    <div (click)="close()" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm transition-opacity"></div>

    <div [style.max-width]="dialogService.config().width"
        class="relative w-full rounded-2xl border shadow-xl flex flex-col overflow-hidden max-h-[90vh]
                  bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800/80 transform scale-100 transition-all duration-200">

        <ng-container *ngComponentOutlet="dialogService.childComponent()"></ng-container>

    </div>
</div>
