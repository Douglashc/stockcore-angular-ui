<div
    class="p-5 rounded-2xl border bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800/80 shadow-sm flex items-center justify-between">
    <div>
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">{{ title }}</span>
        <h3 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mt-1">
            {{ totalItem }}
        </h3>
        <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-0.5">{{ description }}</p>
    </div>
    <div
        class="w-12 h-12 rounded-xl flex items-center justify-center bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400">
        <span [class]="logoClass">{{ logoSpan }}</span>
    </div>
</div>
