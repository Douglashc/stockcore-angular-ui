<div class="flex items-center gap-2">
    <button 
    type="button"
    (click)="menuClick()"
    class="flex items-center justify-center w-9 h-9 rounded-lg border md:hidden transition-colors duration-200
           bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 hover:dark:bg-slate-700">
    <span class="material-icons text-xl">menu</span>
  </button>
    <span
        class="text-xs font-semibold px-2.5 py-1 rounded-lg select-none border transition-colors duration-300
               bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700/50">
        Almacén Central
    </span>
</div>

<div class="flex items-center gap-4">

    <shared-theme-toggle [isAuth]="false"></shared-theme-toggle>

    <div class="w-px h-5 bg-slate-200 dark:bg-slate-800"></div>

    <div class="relative">

        <button type="button" (click)="toggleProfileMenu()" class="flex items-center gap-2.5 focus:outline-none group">
            <div
                class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs transition-colors duration-200
              bg-indigo-50 dark:bg-indigo-600/10 border border-indigo-100 dark:border-indigo-500/20 text-indigo-600 dark:text-indigo-400 group-hover:border-indigo-400 dark:group-hover:border-indigo-500/40">
                H
            </div>
            <span
                class="hidden sm:block text-xs font-medium transition-colors duration-200 text-slate-600 dark:text-slate-300 group-hover:text-slate-900 group-hover:dark:text-white">
                Henry Douglas
            </span>

            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                class="w-4 h-4 text-slate-400 dark:text-slate-500 group-hover:text-slate-600 group-hover:dark:text-slate-300 transition-transform duration-200"
                [ngClass]="{'rotate-180': isProfileMenuOpen}">
                <path fill-rule="evenodd"
                    d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                    clip-rule="evenodd" />
            </svg>
        </button>

        <div *ngIf="isProfileMenuOpen" (click)="isProfileMenuOpen = false" class="absolute right-0 mt-2 w-48 rounded-xl border p-1.5 shadow-xl transition-all duration-150 z-50
         bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300">

            <div class="px-3 py-2 mb-1 border-b border-slate-100 dark:border-slate-800/60">
                <p class="text-[11px] font-semibold text-slate-900 dark:text-white truncate">Henry Chavarria</p>
                <p class="text-[9px] text-slate-400 dark:text-slate-500 truncate">Systems Engineer</p>
            </div>

            <a href="#" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-xs font-medium transition-all
                     hover:bg-slate-100 hover:dark:bg-slate-800 hover:text-slate-900 hover:dark:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                    class="w-4 h-4 text-slate-400 dark:text-slate-500">
                    <path
                        d="M10 8a3 3 0 100-6 3 3 0 000 6zM3.465 14.493a1.23 1.23 0 00.41 1.412A9.957 9.957 0 0010 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 00-13.074.003z" />
                </svg>
                <span>Ver perfil</span>
            </a>

            <button type="button" (click)="onExit()"
                class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-xs font-medium text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all text-left">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                    <path fill-rule="evenodd"
                        d="M3 4.25A2.25 2.25 0 015.25 2h5.5A2.25 2.25 0 0113 4.25v2a.75.75 0 01-1.5 0v-2a.75.75 0 00-.75-.75h-5.5a.75.75 0 00-.75.75v11.5c0 .414.336.75.75.75h5.5a.75.75 0 00.75-.75v-2a.75.75 0 011.5 0v2A2.25 2.25 0 0110.75 18h-5.5A2.25 2.25 0 013 15.75V4.25z"
                        clip-rule="evenodd" />
                    <path fill-rule="evenodd"
                        d="M19 10a.75.75 0 01-.75.75H8.56l1.72 1.72a.75.75 0 11-1.06 1.06l-3-3a.75.75 0 010-1.06l3-3a.75.75 0 111.06 1.06L8.56 9.25h9.69A.75.75 0 0119 10z"
                        clip-rule="evenodd" />
                </svg>
                <span>Salir</span>
            </button>

        </div>

    </div>

</div>
