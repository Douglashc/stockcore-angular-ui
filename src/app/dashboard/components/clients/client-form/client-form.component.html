<div
    class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center bg-slate-50/50 dark:bg-slate-950/20">
    <div>
        <h2 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-icons text-indigo-500 text-lg">badge</span>
            {{ data?.clientId ? 'Modificar Información del Client' : 'Registrar Nuevo Client' }}
        </h2>
        <p class="text-[11px] text-slate-400 dark:text-slate-500">Administración de datos de facturación y cartera
            comercial.</p>
    </div>
    <button type="button" (click)="cancel()"
        class="p-1 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-icons text-lg">close</span>
    </button>
</div>

<form [formGroup]="clientForm" class="p-6 space-y-4 text-sm">

    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Nombre Completo /
            Razón Social *</label>
        <div class="relative">
            <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">person</span>
            <input formControlName="name" type="text" placeholder="Ej: Maria Lorena Lima Perez"
                class="w-full pl-9 pr-4 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500" />
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Documento de
                Identidad (CI) *</label>
            <input formControlName="ci" type="text" placeholder="Ej: 12014521"
                class="w-full px-3 py-2 rounded-xl border outline-none font-mono text-xs transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500" />
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Número de NIT
                (Opcional)</label>
            <input formControlName="nit" type="text" placeholder="Ej: 151513213"
                class="w-full px-3 py-2 rounded-xl border outline-none font-mono text-xs transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500" />
        </div>
    </div>

</form>

<div
    class="px-6 py-4 border-t flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-950/20 border-slate-100 dark:border-slate-800/60">
    <button type="button" (click)="cancel()"
        class="px-4 py-2 text-xs font-medium border rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100">
        Cancelar
    </button>
    <button type="button" (click)="save()" [disabled]="clientForm.invalid"
        class="px-4 py-2 text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        Guardar Client
    </button>
</div>
