<div
    class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center bg-slate-50/50 dark:bg-slate-950/20">
    <div>
        <h2 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-icons text-indigo-500 text-lg">add_box</span>
            {{ data?.productId ? 'Modificar Producto' : 'Registrar Nuevo Producto' }}
        </h2>
        <p class="text-[11px] text-slate-400 dark:text-slate-500">Módulo maestro del inventario relacional.</p>
    </div>
    <button type="button" (click)="cancel()"
        class="p-1 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-icons text-lg">close</span>
    </button>
</div>

<form [formGroup]="productForm" class="p-6 space-y-4 overflow-y-auto custom-scroll flex-1 text-sm">

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Código
                *</label>
            <input formControlName="code" type="text" placeholder="Ej: LI-001"
                class="w-full px-3 py-2 rounded-xl border outline-none font-mono text-xs transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div class="sm:col-span-2">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Nombre del
                Producto *</label>
            <input formControlName="name" type="text" placeholder="Ej: Lavandina para piso"
                class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Categoría
                *</label>
            <select formControlName="categoryId"
                class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <option [value]="null" disabled selected>Seleccione categoría...</option>
                <option [value]="1">Limpieza</option>
                <option [value]="2">Herramientas</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Precio Venta
                ($) *</label>
            <input formControlName="salePrice" type="number" placeholder="0.00" step="0.01"
                class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
    </div>

    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">URL de la
            Imagen</label>
        <input formControlName="imageUrl" type="text" placeholder="Pega el enlace web de la imagen..."
            class="w-full px-3 py-2 rounded-xl border outline-none text-xs transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
    </div>

    <div
        class="pt-2 flex items-center justify-between p-4 rounded-xl border bg-slate-50/50 dark:bg-slate-950/20 border-slate-200 dark:border-slate-800/60">
        <div class="flex gap-2.5 items-start">
            <span class="material-icons text-indigo-500 mt-0.5">layers</span>
            <div>
                <p class="font-semibold text-slate-800 dark:text-slate-200 text-xs">¿Maneja Lotes y Vencimientos?</p>
                <p class="text-[11px] text-slate-400 dark:text-slate-500">Control estricto de fechas de expiración.</p>
            </div>
        </div>
        <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" formControlName="handlesBatches" class="sr-only peer" />
            <div
                class="w-9 h-5 rounded-full transition-all duration-200 bg-slate-300 dark:bg-slate-800 peer-checked:bg-indigo-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full">
            </div>
        </label>
    </div>
</form>

<div
    class="px-6 py-4 border-t flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-950/20 border-slate-100 dark:border-slate-800/60">
    <button type="button" (click)="cancel()"
        class="px-4 py-2 text-xs font-medium border rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100">
        Cancelar
    </button>
    <button type="button" (click)="save()" [disabled]="productForm.invalid"
        class="px-4 py-2 text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        Guardar Ítems
    </button>
</div>
