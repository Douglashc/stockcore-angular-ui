<div class="bg-white dark:bg-slate-900 overflow-hidden flex flex-col max-h-[90vh]">

    <div
        class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center bg-slate-50/50 dark:bg-slate-950/20">
        <div>
            <h2 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <span class="material-icons text-indigo-500 text-lg">receipt_long</span>
                Facturar Nueva Venta / Salida
            </h2>
            <p class="text-[11px] text-slate-400 dark:text-slate-500">Disminución de inventario en tiempo real por
                sucursal de origen.</p>
        </div>
        <button type="button" (click)="cancel()"
            class="p-1 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <span class="material-icons text-lg">close</span>
        </button>
    </div>

    <form [formGroup]="saleForm" class="flex-1 overflow-y-auto custom-scroll p-6 space-y-6 text-sm">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
            <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Cliente
                    (Client) *</label>
                <select formControlName="clientId"
                    class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500">
                    <option [value]="null" disabled selected>Seleccione el cliente...</option>
                    <option *ngFor="let client of clientsList()" [value]="client.id">{{ client.name }}</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Sucursal
                    Origen (Branch) *</label>
                <select formControlName="branchId"
                    class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500">
                    <option [value]="null" disabled selected>¿De qué sucursal rebaja stock?...</option>
                    <option *ngFor="let b of branchesList()" [value]="b.id">{{ b.name }}</option>
                </select>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-2">
                <h3
                    class="font-bold text-slate-800 dark:text-slate-200 uppercase text-xs tracking-wider flex items-center gap-1.5">
                    <span class="material-icons text-indigo-500 text-base">local_mall</span> Ítems de la Factura
                </h3>
                <button type="button" (click)="addDetailRow()"
                    class="flex items-center gap-1 px-2.5 py-1 text-xs font-medium text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-500/10 hover:bg-indigo-100 rounded-lg transition-all">
                    <span class="material-icons text-sm">add</span> Agregar Ítem
                </button>
            </div>

            <div formArrayName="details" class="space-y-3">
                <div *ngFor="let row of detailsFormArray.controls; let i = index" [formGroupName]="i"
                    class="grid grid-cols-1 sm:grid-cols-12 gap-3 items-center p-3 rounded-xl border bg-slate-50/30 dark:bg-slate-950/10 border-slate-200/60 dark:border-slate-800/60 animate-fade-in">

                    <div class="sm:col-span-5">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"
                            *ngIf="i === 0">Producto</label>
                        <select formControlName="productId"
                            class="w-full px-2.5 py-1.5 rounded-lg border outline-none text-xs bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 focus:border-indigo-500">
                            <option [value]="null" disabled selected>Seleccione artículo...</option>
                            <option *ngFor="let prod of productsList()" [value]="prod.id">{{ prod.name }}</option>
                        </select>
                    </div>

                    <div class="sm:col-span-3">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1" *ngIf="i === 0">Lote
                            Origen</label>
                        <select formControlName="loteId"
                            class="w-full px-2.5 py-1.5 rounded-lg border outline-none text-xs bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 focus:border-indigo-500">
                            <option [value]="null" disabled selected>Seleccione lote...</option>
                            <option *ngFor="let lot of lotesList()" [value]="lot.id">{{ lot.code }}</option>
                        </select>
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"
                            *ngIf="i === 0">Cant.</label>
                        <input formControlName="quantity" type="number" (input)="calculateTotal()"
                            class="w-full px-2 py-1.5 rounded-lg border outline-none text-xs font-mono text-center bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 focus:border-indigo-500" />
                    </div>

                    <div class="sm:col-span-3">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1" *ngIf="i === 0">Precio
                            Venta ($)</label>
                        <div class="flex items-center gap-2">
                            <input formControlName="unitPrice" type="number" step="0.01" (input)="calculateTotal()"
                                placeholder="0.00"
                                class="w-full px-2 py-1.5 rounded-lg border outline-none text-xs font-mono text-right bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 focus:border-indigo-500" />

                            <button type="button" (click)="removeDetailRow(i)"
                                [disabled]="detailsFormArray.length === 1"
                                class="text-slate-400 hover:text-red-500 disabled:opacity-20 p-1 rounded transition-colors">
                                <span class="material-icons text-base">delete_outline</span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </form>

    <div
        class="px-6 py-4 border-t flex items-center justify-between bg-slate-50/50 dark:bg-slate-950/20 border-slate-100 dark:border-slate-800/60">
        <div class="text-slate-500 dark:text-slate-400 text-xs">
            Total Nota de Venta: <span class="text-base font-bold text-emerald-500 font-mono ml-1">{{ totalSale() |
                currency }}</span>
        </div>
        <div class="flex gap-3">
            <button type="button" (click)="cancel()"
                class="px-4 py-2 text-xs font-medium border rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100">
                Cancelar
            </button>
            <button type="button" (click)="save()" [disabled]="saleForm.invalid"
                class="px-4 py-2 text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all disabled:opacity-40">
                Cerrar Factura
            </button>
        </div>
    </div>
</div>
