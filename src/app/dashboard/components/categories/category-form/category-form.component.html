<div
    class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center bg-slate-50/50 dark:bg-slate-950/20">
    <div>
        <h2 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-icons text-indigo-500 text-lg">category</span>
            {{ data?.categoryId ? 'Modificar Categoría' : 'Registrar Nueva Categoría' }}
        </h2>
        <p class="text-[11px] text-slate-400 dark:text-slate-500">Gestión de agrupadores maestros de inventario.</p>
    </div>
    <button type="button" (click)="cancel()"
        class="p-1 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-icons text-lg">close</span>
    </button>
</div>

<form [formGroup]="categoryForm" class="p-6 space-y-4 text-sm">

    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Nombre de
            Categoría *</label>
        <input formControlName="name" type="text" placeholder="Ej: Limpieza, Herramientas..."
            class="w-full px-3 py-2 rounded-xl border outline-none transition-all bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
    </div>

    <div>
        <label
            class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Descripción</label>
        <textarea formControlName="description" rows="3" placeholder="Breve descripción del alcance de la categoría..."
            class="w-full px-3 py-2 rounded-xl border outline-none transition-all resize-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
    </div>

    <div
        class="flex items-center justify-between p-4 rounded-xl border bg-slate-50/50 dark:bg-slate-950/20 border-slate-200 dark:border-slate-800/60">
        <div class="flex gap-2.5 items-start">
            <span class="material-icons text-indigo-500 mt-0.5">toggle_on</span>
            <div>
                <p class="font-semibold text-slate-800 dark:text-slate-200 text-xs">Estado de Categoría</p>
                <p class="text-[11px] text-slate-400 dark:text-slate-500">Controla si estará visible para nuevos
                    productos.</p>
            </div>
        </div>
        <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" formControlName="active" class="sr-only peer" />
            <div
                class="w-9 h-5 rounded-full transition-all duration-200 bg-slate-300 dark:bg-slate-800 peer-checked:bg-indigo-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full">
            </div>
        </label>
    </div>

</form>

<div
    class="px-6 py-4 border-t flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-950/20 border-slate-100 dark:border-slate-800/60">
    <button type="button" (click)="cancel()"
        class="px-4 py-2 text-xs font-medium border rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100">
        Cancelar
    </button>
    <button type="button" (click)="save()" [disabled]="categoryForm.invalid"
        class="px-4 py-2 text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all disabled:opacity-40 disabled:cursor-not-allowed">
        Guardar Categoría
    </button>
</div>
