<div class="h-full flex flex-col justify-between py-6">

    <div class="px-6 mb-4 flex-shrink-0">
        <div class="flex items-center justify-between select-none text-slate-900 dark:text-white">

            <div class="flex items-center gap-2.5">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-6 h-6 text-indigo-600 dark:text-indigo-400 flex-shrink-0" viewBox="0 0 24 24"
                    fill="currentColor">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                <span *ngIf="!isMini"
                    class="text-base font-semibold tracking-tight transition-opacity duration-200">StockCore</span>
            </div>

            <button type="button" (click)="toggleMini()"
                class="hidden md:flex items-center justify-center w-7 h-7 rounded-lg border transition-colors duration-200
               bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-200 hover:dark:bg-slate-700 text-slate-500 dark:text-slate-400">
                <span class="material-icons text-base transition-transform duration-300"
                    [ngClass]="{'rotate-180': isMini}">
                    chevron_left
                </span>
            </button>

        </div>
    </div>

    <div class="flex-1 overflow-y-auto overflow-x-hidden custom-scroll max-h-[calc(100vh-140px)]"
        [ngClass]="isMini ? 'px-3' : 'px-6'">
        <div class="space-y-6 pr-1">

            <nav class="space-y-1.5" *ngFor="let group of menuGroups()">

                <span *ngIf="group.groupTitle && !isMini"
                    class="block text-[10px] font-bold tracking-widest uppercase px-3 mb-2 text-slate-400 dark:text-slate-500 select-none">
                    {{ group.groupTitle }}
                </span>

                <a *ngFor="let item of group.items" [routerLink]="item.route" [title]="isMini ? item.title : ''"
                    [ngClass]="isMini ? 'justify-center px-0 h-11' : 'px-3 py-2.5'"
                    class="flex items-center gap-3 rounded-xl text-sm font-medium transition-all group
                  text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-white"
                    routerLinkActive="bg-slate-100 dark:bg-slate-800/50 text-slate-900 dark:text-white"
                  >
                    <span
                        class="material-icons text-lg text-slate-400 dark:text-slate-500 group-hover:text-indigo-600 
                        dark:group-hover:text-indigo-400 transition-colors flex-shrink-0"
                        >
                        {{ item.icon }}
                    </span>
                    <span *ngIf="!isMini" class="truncate">{{ item.title }}</span>
                </a>

            </nav>

        </div>
    </div>

    <div class="border-t pt-4 flex items-center border-slate-200 dark:border-slate-800/60 mt-auto flex-shrink-0"
        [ngClass]="isMini ? 'justify-center px-0' : 'px-6 gap-3'">
        <div
            class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs bg-indigo-50 dark:bg-indigo-600/10 border border-indigo-100 dark:border-indigo-500/20 text-indigo-600 dark:text-indigo-400 flex-shrink-0">
            U
        </div>
        <div *ngIf="!isMini" class="min-w-0 flex-1 transition-opacity duration-200">
            <p class="text-xs font-medium truncate text-slate-900 dark:text-white">Administrador</p>
            <p class="text-[10px] truncate text-slate-400 dark:text-slate-500">admin&#64;stockcore.com</p>
        </div>
    </div>

</div>
