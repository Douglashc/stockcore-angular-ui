<div
    class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center bg-slate-50/50 dark:bg-slate-950/20">
    <div>
        <h2 class="text-base font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-icons text-indigo-500 text-lg">swap_horiz</span>
            Registrar Movimiento de Inventario
        </h2>
        <p class="text-[11px] text-slate-400 dark:text-slate-500">Ajustes manuales, mermas y control físico de stock.
        </p>
    </div>
    <button type="button" (click)="cancel()"
        class="p-1 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-icons text-lg">close</span>
    </button>
</div>

<form [formGroup]="movementForm" class="p-6 space-y-4 text-sm">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Tipo de
                Movimiento *</label>
            <select formControlName="type"
                class="w-full px-3 py-2 rounded-xl border outline-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500">
                <option [value]="null" disabled selected>Seleccione tipo...</option>
                <option *ngFor="let t of movementTypes" [value]="t">{{ t }}</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Sucursal
                (Branch) *</label>
            <select formControlName="branchId"
                class="w-full px-3 py-2 rounded-xl border outline-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500">
                <option [value]="null" disabled selected>Seleccione sucursal...</option>
                <option *ngFor="let b of branchesList()" [value]="b.id">{{ b.name }}</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Producto
                *</label>
            <select formControlName="productId"
                class="w-full px-3 py-2 rounded-xl border outline-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500">
                <option [value]="null" disabled selected>Seleccione producto...</option>
                <option *ngFor="let p of productsList()" [value]="p.id">{{ p.name }}</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Lote Asociado
                *</label>
            <select formControlName="loteId" [attr.disabled]="filteredLotes().length === 0 ? true : null"
                class="w-full px-3 py-2 rounded-xl border outline-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 disabled:opacity-50">
                <option [value]="null" disabled selected>{{ filteredLotes().length === 0 ? 'Primero elija un producto' :
                    'Seleccione lote...' }}</option>
                <option *ngFor="let l of filteredLotes()" [value]="l.id">{{ l.code }}</option>
            </select>
        </div>
    </div>

    <div class="max-w-[150px]">
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Cantidad
            *</label>
        <input formControlName="quantity" type="number" min="1"
            class="w-full px-3 py-2 rounded-xl border outline-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500 font-mono" />
    </div>

    <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Observaciones /
            Motivo</label>
        <textarea formControlName="observation" rows="2" placeholder="Describa el porqué del ajuste..."
            class="w-full px-3 py-2 rounded-xl border outline-none transition-all resize-none bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 focus:border-indigo-500"></textarea>
    </div>

</form>

<div
    class="px-6 py-4 border-t flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-950/20 border-slate-100 dark:border-slate-800/60">
    <button type="button" (click)="cancel()"
        class="px-4 py-2 text-xs font-medium border rounded-xl bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100">
        Cancelar
    </button>
    <button type="button" (click)="save()" [disabled]="movementForm.invalid"
        class="px-4 py-2 text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all disabled:opacity-40">
        Confirmar Movimiento
    </button>
</div>
