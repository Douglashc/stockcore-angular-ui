<div class="min-h-screen flex overflow-hidden transition-colors duration-300
            bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100">

  <div *ngIf="isSidebarOpen" (click)="isSidebarOpen = false"
    class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300">
  </div>

  <app-sidebar [isMini]="isSidebarMini" [ngClass]="[
      isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0',
      isSidebarMini ? 'md:w-20' : 'md:w-64'
    ]" class="fixed md:static inset-y-0 left-0 z-50 flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out
           bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800/60">
  </app-sidebar>

  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

    <app-header (onToggleMenu)="toggleSidebar()" class="h-16 flex items-center justify-between px-6 border-b backdrop-blur-sm z-10 transition-colors duration-300
             bg-white/80 dark:bg-slate-900/50 border-slate-200 dark:border-slate-800/60"></app-header>

    <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-slate-100/40 dark:bg-slate-950/40">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
  <shared-dialog-container></shared-dialog-container>

</div>
